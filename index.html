<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Epoch</title>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --border: #30363d;
  --text: #e6edf3;
  --text-dim: #8b949e;
  --accent: #58a6ff;
  --accent2: #3fb950;
  --danger: #f85149;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Header */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.header .logo {
  font-size: 18px;
  font-weight: 700;
  color: var(--accent);
}
.header .spacer { flex: 1; }
.header .status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text-dim);
}
.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent2);
}
.status-dot.off { background: var(--danger); }
.btn {
  background: var(--border);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  transition: all .2s;
}
.btn:hover { background: #3a3f4b; border-color: var(--accent); }
.btn.accent { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn.accent:hover { opacity: 0.85; }

/* Chat area */
.chat-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  max-width: 900px;
  margin: 0 auto;
  width: 100%;
}
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.message {
  max-width: 85%;
  animation: fadeIn .3s;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.message.user {
  align-self: flex-end;
}
.message.user .bubble {
  background: var(--accent);
  color: #fff;
  border-radius: 16px 16px 4px 16px;
  padding: 10px 14px;
  font-size: 14px;
  line-height: 1.5;
  white-space: pre-wrap;
  word-break: break-word;
}
.message.agent {
  align-self: flex-start;
}
.message.agent .bubble {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px 16px 16px 4px;
  padding: 12px 16px;
  font-size: 14px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
}

/* Input */
.input-area {
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 12px 16px;
  display: flex;
  gap: 10px;
  flex-shrink: 0;
}
.input-area input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  color: var(--text);
  font-size: 14px;
  outline: none;
  transition: border-color .2s;
}
.input-area input:focus {
  border-color: var(--accent);
}
.input-area input::placeholder {
  color: var(--text-dim);
}

/* Loading */
.typing-indicator {
  display: flex;
  gap: 4px;
  padding: 8px 0;
}
.typing-indicator span {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--text-dim);
  animation: typing 1.4s infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: .2s; }
.typing-indicator span:nth-child(3) { animation-delay: .4s; }
@keyframes typing {
  0%, 60%, 100% { transform: translateY(0); opacity: .4; }
  30% { transform: translateY(-6px); opacity: 1; }
}

/* Settings modal */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,.6);
  z-index: 100;
  justify-content: center;
  align-items: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  width: 500px;
  max-width: 90vw;
  max-height: 80vh;
  overflow-y: auto;
}
.modal h3 { margin-bottom: 16px; color: var(--accent); }
.form-group {
  margin-bottom: 14px;
}
.form-group label {
  display: block;
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 4px;
}
.form-group input {
  width: 100%;
  padding: 8px 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 13px;
  outline: none;
}
.form-group input:focus {
  border-color: var(--accent);
}
.form-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 16px;
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">AI Epoch</div>
  <div class="spacer"></div>
  <div class="status">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">就绪</span>
  </div>
  <button class="btn" onclick="toggleSettings()" title="设置">⚙ 设置</button>
  <button class="btn" onclick="resetChat()" title="新对话">+ 新对话</button>
</div>

<div class="chat-area">
  <div class="messages" id="messages">
    <div class="message agent">
      <div class="bubble">
        你好！我是 AI Epoch，你的智能 AI 助手。<br><br>
        试试问我：<br>• "Python 中如何实现多线程？"<br>• "帮我写一段快速排序的代码"<br>• "推荐几本程序员的必读书籍"
      </div>
    </div>
  </div>

  <div class="input-area">
    <input type="text" id="userInput"
           placeholder="输入你的问题..."
           onkeydown="if(event.key==='Enter') sendMessage()"
           autofocus>
    <button class="btn accent" onclick="sendMessage()" id="sendBtn">发送</button>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <h3>设置</h3>
    <div class="form-group">
      <label>API 地址 (OpenAI 兼容)</label>
      <input type="text" id="cfgApiBase" placeholder="https://api.openai.com/v1">
    </div>
    <div class="form-group">
      <label>API Key</label>
      <input type="password" id="cfgApiKey" placeholder="sk-...">
    </div>
    <div class="form-group">
      <label>模型</label>
      <input type="text" id="cfgModel" placeholder="gpt-4o-mini">
    </div>
    <div class="form-actions">
      <button class="btn" onclick="toggleSettings()">取消</button>
      <button class="btn accent" onclick="saveSettings()">保存</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// State
// ============================================================
let isLoading = false;

// ============================================================
// Init
// ============================================================
async function init() {
  await Promise.all([loadStatus(), loadConfig()]);
}
init();

async function loadStatus() {
  try {
    const r = await fetch('/api/status');
    const d = await r.json();
    document.getElementById('statusDot').className = 'status-dot ' + (d.api_configured ? '' : 'off');
    document.getElementById('statusText').textContent =
      d.api_configured ? `就绪 - ${d.model}` : '未配置 API Key';
  } catch(e) {
    document.getElementById('statusDot').className = 'status-dot off';
    document.getElementById('statusText').textContent = '服务离线';
  }
}

async function loadConfig() {
  try {
    const r = await fetch('/api/config');
    const d = await r.json();
    document.getElementById('cfgApiBase').value = d.ai?.api_base || '';
    document.getElementById('cfgApiKey').value = d.ai?.api_key || '';
    document.getElementById('cfgModel').value = d.ai?.model || '';
  } catch(e) { /* ignore */ }
}

// ============================================================
// Chat
// ============================================================
function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
  document.getElementById('messages').appendChild(div);
  scrollBottom();
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'message agent';
  div.id = 'typingMsg';
  div.innerHTML = '<div class="bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>';
  document.getElementById('messages').appendChild(div);
  scrollBottom();
}

function removeTyping() {
  const el = document.getElementById('typingMsg');
  if (el) el.remove();
}

function scrollBottom() {
  const msgs = document.getElementById('messages');
  setTimeout(() => msgs.scrollTop = msgs.scrollHeight, 50);
}

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  isLoading = true;
  input.value = '';
  document.getElementById('sendBtn').disabled = true;

  addMessage('user', text);
  addTyping();

  try {
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: text})
    });
    const d = await r.json();

    removeTyping();

    if (d.error) {
      addMessage('agent', `错误: ${d.error}`);
    } else {
      addMessage('agent', d.reply);
    }
  } catch(e) {
    removeTyping();
    addMessage('agent', `网络错误: ${e.message}`);
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('userInput').focus();
}

async function resetChat() {
  await fetch('/api/reset', {method: 'POST'});
  document.getElementById('messages').innerHTML = `
    <div class="message agent">
      <div class="bubble">对话已重置。有什么我可以帮你的？</div>
    </div>
  `;
}

// ============================================================
// Settings
// ============================================================
function toggleSettings() {
  document.getElementById('settingsModal').classList.toggle('show');
  if (document.getElementById('settingsModal').classList.contains('show')) {
    loadConfig();
  }
}

async function saveSettings() {
  const data = {
    ai: {
      api_base: document.getElementById('cfgApiBase').value.trim(),
      api_key: document.getElementById('cfgApiKey').value.trim(),
      model: document.getElementById('cfgModel').value.trim()
    }
  };

  try {
    const r = await fetch('/api/config', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data)
    });
    await r.json();
    toggleSettings();
    await loadStatus();
    addMessage('agent', '设置已保存并生效。');
  } catch(e) {
    alert('保存失败: ' + e.message);
  }
}

// ============================================================
// Helpers
// ============================================================
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

document.getElementById('settingsModal').addEventListener('click', function(e) {
  if (e.target === this) toggleSettings();
});
</script>
</body>
</html>
